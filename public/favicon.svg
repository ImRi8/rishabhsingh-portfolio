<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Professional gradient background -->
  <rect width="256" height="256" fill="url(#grad1)"/>
  
  <!-- Rounded corners effect -->
  <rect width="256" height="256" rx="0" fill="url(#grad1)"/>
  
  <!-- Main text: RS in bold, professional font -->
  <text x="128" y="172" font-family="Helvetica, Arial, sans-serif" font-size="110" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="middle">RS</text>
</svg>